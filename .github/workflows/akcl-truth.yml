name: akcl-truth

on:
  push:
  pull_request:

jobs:
  akcl-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run AKCL truth suite
        run: make akcl-truth
